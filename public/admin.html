<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/><title>管理後台｜Alpha Signal AI</title><link rel="stylesheet" href="/style.css"/></head><body><header class="topbar"><div class="container nav"><a class="brand" href="/"><div class="logo">AS</div><div>Alpha Signal AI<div class="small muted">管理後台</div></div></a><nav class="links"><a href="/">首頁</a><a href="/dashboard.html">會員中心</a></nav><button class="btn secondary" id="logoutBtn">登出</button></div></header><main class="container section"><div class="sectionHead"><div><h2>管理後台</h2><p class="muted">管理會員、方案、訊號與推播。</p></div></div><div class="grid cols4"><div class="card"><h3>會員數</h3><div class="value" id="userCount">—</div></div><div class="card"><h3>訊號數</h3><div class="value" id="signalCount">—</div></div><div class="card"><h3>紀錄數</h3><div class="value" id="paymentCount">—</div></div><div class="card"><h3>推播數</h3><div class="value" id="telegramCount">—</div></div></div><section class="section"><div class="sectionHead"><div><h2>會員資料</h2><p class="muted">可查看名稱、信箱、登入方式、方案與安全狀態。</p></div><button class="btn secondary" id="refreshUsers">刷新</button></div><div class="tableWrap"><table><thead><tr><th>ID</th><th>名稱</th><th>信箱</th><th>登入方式</th><th>安全狀態</th><th>方案</th><th>角色</th><th>Telegram</th><th>註冊時間</th></tr></thead><tbody id="usersTable"></tbody></table></div></section><section class="section"><div class="sectionHead"><div><h2>訊號掃描與保存</h2><p class="muted">後端掃描後會寫入資料庫。</p></div></div><div class="card"><div class="formGrid"><label>方向<select id="scanSide"><option value="auto">自動多空</option><option value="short">只找空</option><option value="long">只找多</option></select></label><label>週期<select id="scanTf"><option value="5m">5m</option><option value="15m">15m</option></select></label><label>掃描數量<select id="scanLimit"><option value="15">15</option><option value="25" selected>25</option><option value="40">40</option></select></label><label>最低分數<select id="scanScore"><option value="58">58+</option><option value="65" selected>65+</option><option value="72">72+</option></select></label></div><div class="row" style="margin-top:12px"><button class="btn" id="scanBtn">開始掃描並保存</button><button class="btn secondary" id="refreshSignals">刷新訊號</button></div></div><div class="tableWrap" style="margin-top:14px"><table><thead><tr><th>ID</th><th>幣種</th><th>方向</th><th>ENTRY</th><th>TP1 / SL</th><th>分數</th><th>時間</th><th>操作</th></tr></thead><tbody id="signalsTable"></tbody></table></div></section><section class="section"><div class="sectionHead"><div><h2>付款紀錄</h2><p class="muted">升級後可在此批准開通。</p></div></div><div class="tableWrap"><table><thead><tr><th>ID</th><th>用戶</th><th>方案</th><th>狀態</th><th>來源</th><th>時間</th><th>操作</th></tr></thead><tbody id="paymentsTable"></tbody></table></div></section></main><div class="toast" id="toast"></div><script src="/admin.js"></script></body></html>
